<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Budget Calculator - macOS Edition</title>
    <!-- Tailwind CSS for Modern Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Arial', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }
        /* Custom scrollbar for beautiful macOS feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 sm:p-6 md:p-8 selection:bg-blue-200">

    <!-- Main macOS Window Container -->
    <div class="w-full max-w-lg bg-white/80 backdrop-blur-md rounded-2xl shadow-2xl border border-white/40 overflow-hidden transform transition-all duration-300 hover:shadow-3xl">
        
        <!-- macOS Window Title Bar -->
        <div class="bg-gray-100/90 px-4 py-3 border-b border-gray-200/80 flex items-center justify-between select-none">
            <!-- Window Buttons -->
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full bg-[#FF5F56] border border-[#E0443E] cursor-pointer hover:opacity-80 transition" title="Close"></div>
                <div class="w-3 h-3 rounded-full bg-[#FFBD2E] border border-[#DEA123] cursor-pointer hover:opacity-80 transition" title="Minimize"></div>
                <div class="w-3 h-3 rounded-full bg-[#27C93F] border border-[#1AAB29] cursor-pointer hover:opacity-80 transition" title="Maximize"></div>
            </div>
            <!-- Window Title -->
            <div class="text-[11px] sm:text-xs font-semibold text-gray-500 tracking-wide">Budget Planner</div>
            <!-- Empty space for symmetry -->
            <div class="w-12"></div>
        </div>

        <!-- App Body Content -->
        <div class="p-5 sm:p-6 md:p-8 space-y-6">
            
            <!-- Header -->
            <div class="text-center space-y-1">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-800 tracking-tight">more shopping? 🛍️</h1>
                <p class="text-[11px] sm:text-xs text-gray-500">Calculate your rewards and plan your lifestyle spending</p>
            </div>

            <!-- Form Inputs -->
            <div class="space-y-4">
                <!-- Gaji Pokok Input -->
                <div class="space-y-1.5">
                    <label for="gaji-pokok" class="text-[10px] sm:text-xs font-semibold text-gray-600 uppercase tracking-wider block">Gaji Pokok (Base Salary)</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">Rp</span>
                        <!-- Changed to type="text" and inputmode="numeric" for custom dot formatting on mobile keyboards -->
                        <input type="text" id="gaji-pokok" name="gaji-pokok" inputmode="numeric" placeholder="e.g. 5.000.000"
                            class="w-full pl-10 pr-4 py-2.5 bg-white/50 border border-gray-200 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition duration-200 text-sm font-medium">
                    </div>
                </div>

                <!-- Bonus Input -->
                <div class="space-y-1.5">
                    <label for="bonus" class="text-[10px] sm:text-xs font-semibold text-gray-600 uppercase tracking-wider block">Bonus Bulan Ini</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">Rp</span>
                        <!-- Changed to type="text" and inputmode="numeric" for custom dot formatting on mobile keyboards -->
                        <input type="text" id="bonus" name="bonus" inputmode="numeric" placeholder="e.g. 4.000.000"
                            class="w-full pl-10 pr-4 py-2.5 bg-white/50 border border-gray-200 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition duration-200 text-sm font-medium">
                    </div>
                </div>
            </div>

            <!-- Action Button (macOS System Blue Style) -->
            <button id="calculate-btn" class="w-full bg-[#007AFF] hover:bg-[#0062CC] active:scale-[0.98] text-white py-3 px-4 rounded-xl text-xs sm:text-sm font-semibold shadow-md shadow-blue-500/10 transition duration-200 flex items-center justify-center space-x-2">
                <span>Give me lots of shopping budget pls ✨</span>
            </button>

            <!-- Dynamic Notification (Replaces native alert) -->
            <div id="custom-alert" class="hidden transform translate-y-2 opacity-0 transition-all duration-300 p-4 rounded-xl border flex items-start space-x-3">
                <span id="alert-icon" class="text-xl shrink-0"></span>
                <div class="flex-1">
                    <p id="alert-text" class="text-xs font-semibold text-gray-800 leading-tight"></p>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result-box" class="hidden space-y-5 pt-4 border-t border-gray-100">
                <!-- Ratio Badge -->
                <div class="flex items-center justify-between">
                    <span class="text-xs font-medium text-gray-400">Bonus Percentage Rate</span>
                    <span id="rate-badge" class="px-2.5 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-800">0%</span>
                </div>

                <!-- Cards Grid (Responsive Grid) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <!-- Shopping Budget Card -->
                    <div class="bg-blue-50/50 border border-blue-100/50 p-4 rounded-xl space-y-1">
                        <span class="text-[9px] sm:text-[10px] font-bold text-blue-500 uppercase tracking-widest block">Shopping Budget</span>
                        <span id="shopping-val" class="text-sm sm:text-base font-bold text-gray-800">Rp 0</span>
                    </div>
                    <!-- Saving Card -->
                    <div class="bg-emerald-50/50 border border-emerald-100/50 p-4 rounded-xl space-y-1">
                        <span class="text-[9px] sm:text-[10px] font-bold text-emerald-500 uppercase tracking-widest block">Savings</span>
                        <span id="saving-val" class="text-sm sm:text-base font-bold text-gray-800">Rp 0</span>
                    </div>
                </div>

                <!-- Visual Allocation Progress Bar -->
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] sm:text-[11px] font-semibold text-gray-500">
                        <span>Shopping Budget allocation</span>
                        <span id="allocation-ratio">0% / 100%</span>
                    </div>
                    <!-- Bar Track -->
                    <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden flex">
                        <div id="bar-shopping" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                        <div id="bar-saving" class="h-full bg-emerald-500 transition-all duration-500" style="width: 100%"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Script Section -->
    <script>
        // Elements for Inputs
        const gajiInput = document.getElementById('gaji-pokok');
        const bonusInput = document.getElementById('bonus');

        // Formatter Helper for writing input with dot separation
        const formatAsTyped = (val) => {
            // Remove everything that is not a digit
            let clean = val.replace(/[^0-9]/g, '');
            if (clean === '') return '';
            // Parse as integer and format with Indonesian locale (using dots as separators)
            return parseInt(clean, 10).toLocaleString('id-ID');
        };

        // Event listener to handle thousand separator input formatting gracefully
        const applyLiveFormatting = (e) => {
            const inputElement = e.target;
            const cursorPosition = inputElement.selectionStart;
            const originalLength = inputElement.value.length;
            
            const formatted = formatAsTyped(inputElement.value);
            inputElement.value = formatted;
            
            // Adjust the cursor position after injecting dots so typing flows smoothly
            const newLength = formatted.length;
            const newCursorPosition = cursorPosition + (newLength - originalLength);
            inputElement.setSelectionRange(newCursorPosition, newCursorPosition);
        };

        // Attach live listeners to input fields
        gajiInput.addEventListener('input', applyLiveFormatting);
        bonusInput.addEventListener('input', applyLiveFormatting);

        // Main Calculation Trigger
        document.getElementById('calculate-btn').addEventListener('click', function() {
            // Parse the formatted values by stripping the dots out
            const parseCleanValue = (rawString) => {
                return parseFloat(rawString.replace(/\./g, '')) || 0;
            };

            const gajiPokok = parseCleanValue(gajiInput.value);
            const bonus = parseCleanValue(bonusInput.value);
            
            // UI Elements
            const resultBox = document.getElementById('result-box');
            const customAlert = document.getElementById('custom-alert');
            const alertText = document.getElementById('alert-text');
            const alertIcon = document.getElementById('alert-icon');
            const rateBadge = document.getElementById('rate-badge');
            const shoppingVal = document.getElementById('shopping-val');
            const savingVal = document.getElementById('saving-val');
            const allocationRatio = document.getElementById('allocation-ratio');
            const barShopping = document.getElementById('bar-shopping');
            const barSaving = document.getElementById('bar-saving');

            // Currency Formatter Helper
            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    maximumFractionDigits: 0
                }).format(number);
            };

            // Validation (Avoid dividing by 0)
            if (gajiPokok <= 0) {
                // Show Error Alert in modern Banner
                customAlert.className = "flex items-start space-x-3 p-4 rounded-xl border bg-amber-50 border-amber-200 text-amber-800 transition-all duration-300 transform translate-y-0 opacity-100";
                alertIcon.innerHTML = "⚠️";
                alertText.textContent = "Mohon masukkan nominal Gaji Pokok yang valid terlebih dahulu.";
                resultBox.classList.add('hidden');
                return;
            }

            // Calculation Logic
            const total = (bonus / gajiPokok) * 100;
            let shoppingBudget = 0;
            let isNoBonus = false;

            // Tiering rules
            if (total < 70) {
                isNoBonus = true;
            } else if (total >= 70 && total <= 99) {
                shoppingBudget = bonus * 0.1; // 10%
            } else if (total >= 100 && total <= 119) {
                shoppingBudget = bonus * 0.2; // 20%
            } else if (total >= 120) {
                shoppingBudget = bonus * 0.3; // 30%
            }

            const savedAmount = bonus - shoppingBudget;

            // 1. Alert Banner Update
            if (isNoBonus) {
                customAlert.className = "flex items-start space-x-3 p-4 rounded-xl border bg-rose-50 border-rose-200 text-rose-800 transition-all duration-300 transform translate-y-0 opacity-100";
                alertIcon.innerHTML = "😢";
                alertText.textContent = "Yah, rasionya di bawah 70%. Tidak ada alokasi belanja khusus bonus bulan ini, yuk lebih semangat kerja bulan depan!";
            } else {
                customAlert.className = "flex items-start space-x-3 p-4 rounded-xl border bg-emerald-50 border-emerald-200 text-emerald-800 transition-all duration-300 transform translate-y-0 opacity-100";
                alertIcon.innerHTML = "🎉";
                const allocatedPercent = ((shoppingBudget / bonus) * 100).toFixed(0);
                alertText.textContent = `Hore! Kamu berhasil mengalokasikan ${allocatedPercent}% dari bonusmu untuk budget belanja!`;
            }

            // 2. Display Rate and Values
            rateBadge.textContent = `${total.toFixed(1)}% Rasio`;
            shoppingVal.textContent = formatRupiah(shoppingBudget);
            savingVal.textContent = formatRupiah(savedAmount);

            // 3. Update Visual Progress Bars
            const shoppingPercentage = bonus > 0 ? (shoppingBudget / bonus) * 100 : 0;
            const savingPercentage = bonus > 0 ? (savedAmount / bonus) * 100 : 100;

            allocationRatio.textContent = `${shoppingPercentage.toFixed(0)}% Belanja / ${savingPercentage.toFixed(0)}% Tabungan`;
            barShopping.style.width = `${shoppingPercentage}%`;
            barSaving.style.width = `${savingPercentage}%`;

            // Reveal Results Container with smooth display transition
            resultBox.classList.remove('hidden');
        });
    </script>
</body>
</html>
